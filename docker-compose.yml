services:
  db:
    image: pgvector/pgvector:pg16
    container_name: fast_platform_db
    shm_size: 256mb
    command: postgres -c shared_buffers=128MB -c max_connections=40 -c work_mem=4MB -c maintenance_work_mem=32MB -c random_page_cost=1.1 -c effective_cache_size=1GB -c max_worker_processes=4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: fast_platform
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    mem_limit: 512M
    deploy:
      resources:
        limits:
          memory: 512M


  redis:
    image: redis:7-alpine
    container_name: fast_platform_redis
    # [FIX V2.3] volatile-lru: Chỉ xóa key CÓ TTL khi đầy bộ nhớ.
    # allkeys-lru cũ rất nguy hiểm: sẽ xóa cả OrderDraft và security:stamp không có TTL
    # gây mất phiên làm việc admin và mất context đơn hàng của Helen.
    command: redis-server --requirepass ${REDIS_PASSWORD:-postgres} --maxmemory 128mb --maxmemory-policy volatile-lru --rename-command REPLICAOF "" --rename-command SLAVEOF "" --rename-command FLUSHALL "FLUSHALL_SECURE_2026" --rename-command FLUSHDB "FLUSHDB_SECURE_2026"
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    mem_limit: 192M
    deploy:
      resources:
        limits:
          memory: 192M


  caddy:
    image: caddy:2-alpine
    container_name: fast_platform_caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frontend/static:/app/frontend/static:ro
      # Use ACME automatically; remove manual pki mount which may contain malformed certs
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - ACME_AGREE=true
      - EMAIL=admin@osmo.vn
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    env_file:
      - .env
    restart: always

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
      args:
        - UV_CONCURRENCY=${UV_CONCURRENCY:-4}
    container_name: fast_platform_api
    expose:
      - "8000"
    volumes:
      - .:/app
      - /usr/bin/docker:/usr/bin/docker:ro
      - /usr/libexec/docker/cli-plugins:/usr/libexec/docker/cli-plugins:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - .env
    environment:
      - UV_PROJECT_ENVIRONMENT=/opt/venv
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CORS_ALLOWED_ORIGINS=https://${APP_DOMAIN},https://${ADMIN_DOMAIN}
      - STT_USE_STUB=false
      - TTS_USE_STUB=false
      - HF_ENDPOINT=https://hf-mirror.com
      - TZ=Asia/Ho_Chi_Minh
      - PYTHONWARNINGS=ignore:Core Pydantic V1 functionality:UserWarning
      - MALLOC_ARENA_MAX=2  # [GHOST MODE] Chống phân mảnh bộ nhớ glibc
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
    mem_limit: ${API_MEM_LIMIT:-768M}
    deploy:
      resources:
        limits:
          memory: ${API_MEM_LIMIT:-768M}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_started
    restart: always

  ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fast_platform_ui
    expose:
      - "3000"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - .env
    environment:
      - PORT=3000
      - NODE_ENV=production
      - INTERNAL_API_URL=http://api:8000
    mem_limit: 512M
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      api:
        condition: service_started
    restart: always




  worker_high:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    container_name: fast_platform_worker_high
    volumes:
      - .:/app
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - .env
    environment:
      - UV_PROJECT_ENVIRONMENT=/opt/venv
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - TZ=Asia/Ho_Chi_Minh
      - SKIP_MIGRATE=true
      - PYTHONWARNINGS=ignore:Core Pydantic V1 functionality:UserWarning
      - MALLOC_ARENA_MAX=2
    mem_limit: 640M
    deploy:
      resources:
        limits:
          memory: 640M
    command: /opt/venv/bin/arq backend.arq_worker.WorkerHighSettings
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  worker_default:
    profiles:
      - admin
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    container_name: fast_platform_worker_default
    volumes:
      - .:/app
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - .env
    environment:
      - UV_PROJECT_ENVIRONMENT=/opt/venv
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - TZ=Asia/Ho_Chi_Minh
      - SKIP_MIGRATE=true
      - PYTHONWARNINGS=ignore:Core Pydantic V1 functionality:UserWarning
      - MALLOC_ARENA_MAX=2
    mem_limit: 640M
    deploy:
      resources:
        limits:
          memory: 640M
    command: /opt/venv/bin/arq backend.arq_worker.WorkerDefaultSettings
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  worker_fraud:
    profiles:
      - admin
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    container_name: fast_platform_worker_fraud
    volumes:
      - .:/app
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - .env
    environment:
      - UV_PROJECT_ENVIRONMENT=/opt/venv
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - TZ=Asia/Ho_Chi_Minh
      - SKIP_MIGRATE=true
      - PYTHONWARNINGS=ignore:Core Pydantic V1 functionality:UserWarning
      - MALLOC_ARENA_MAX=2
    mem_limit: 384M
    deploy:
      resources:
        limits:
          memory: 384M
    # [FIX V2.3] worker_fraud phải dùng WorkerDefaultSettings (queue: default, max_jobs: 5)
    # Dùng WorkerHighSettings (queue: high) là sai — fraud jobs sẽ chiếm slot của Helen support.
    command: /opt/venv/bin/arq backend.arq_worker.WorkerDefaultSettings
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: fast_platform_docker_proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CONTAINERS=1
      - POST=1
    restart: always
    mem_limit: 64M
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
