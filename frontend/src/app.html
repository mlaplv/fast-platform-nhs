<!doctype html>
<html lang="vi" translate="no">
  <head>
    <meta charset="utf-8" />
    <!-- [Elite V2.2] Dynamic Analytics Loader — GTM + GA + GSC + FB Pixel -->
    <script>(function(){
      // Triệt tiêu tận gốc cảnh báo API Attribution Reporting (Privacy Sandbox) lỗi thời ở mọi tầng
      try {
        // 1. Chặn ghi thuộc tính DOM 'attributionsrc' thông qua setAttribute / setAttributeNode
        var orgSetAttr = Element.prototype.setAttribute;
        Element.prototype.setAttribute = function(name, value) {
          if (typeof name === 'string' && name.toLowerCase() === 'attributionsrc') {
            return;
          }
          return orgSetAttr.apply(this, arguments);
        };

        var orgSetAttrNS = Element.prototype.setAttributeNS;
        Element.prototype.setAttributeNS = function(ns, name, value) {
          if (typeof name === 'string' && name.toLowerCase() === 'attributionsrc') {
            return;
          }
          return orgSetAttrNS.apply(this, arguments);
        };

        var orgSetAttrNode = Element.prototype.setAttributeNode;
        Element.prototype.setAttributeNode = function(node) {
          if (node && typeof node.name === 'string' && node.name.toLowerCase() === 'attributionsrc') {
            return node;
          }
          return orgSetAttrNode.apply(this, arguments);
        };

        // 2. Loại bỏ attributionReporting khỏi tham số của fetch và Request
        if (typeof window.fetch === 'function') {
          var orgFetch = window.fetch;
          window.fetch = function(input, init) {
            if (init && typeof init === 'object') {
              try {
                delete init.attributionReporting;
              } catch(e) {}
            }
            return orgFetch.apply(this, arguments);
          };
        }

        if (typeof window.Request === 'function') {
          var orgRequest = window.Request;
          window.Request = function(input, init) {
            if (init && typeof init === 'object') {
              try {
                delete init.attributionReporting;
              } catch(e) {}
            }
            return new orgRequest(input, init);
          };
          window.Request.prototype = orgRequest.prototype;
        }

        // 3. Khóa các JS properties getter/setter trên prototype
        var targets = [
          { proto: typeof Request !== 'undefined' && Request.prototype, prop: 'attributionReporting' },
          { proto: typeof HTMLAnchorElement !== 'undefined' && HTMLAnchorElement.prototype, prop: 'attributionSrc' },
          { proto: typeof HTMLImageElement !== 'undefined' && HTMLImageElement.prototype, prop: 'attributionSrc' },
          { proto: typeof HTMLScriptElement !== 'undefined' && HTMLScriptElement.prototype, prop: 'attributionSrc' },
          { proto: typeof HTMLAreaElement !== 'undefined' && HTMLAreaElement.prototype, prop: 'attributionSrc' }
        ];
        targets.forEach(function(t) {
          if (t.proto) {
            try {
              delete t.proto[t.prop];
            } catch(e) {}
            try {
              Object.defineProperty(t.proto, t.prop, {
                configurable: false,
                enumerable: true,
                get: function() { return undefined; },
                set: function() {}
              });
            } catch(e) {}
          }
        });
      } catch (e) {}

      /* Check if in admin zone to prevent data leak */
      function isAdminZone() {
        try {
          var h = window.location.hostname;
          return h.indexOf('admin.') !== -1 || window.location.search.indexOf('admin') !== -1;
        } catch (e) {}
        return false;
      }

      if (isAdminZone()) {
        console.log("[SECURITY] Admin Zone detected. Suppressing analytics trackers to prevent data leak.");
        try {
          var raw = sessionStorage.getItem('primary_config');
          if (raw) {
            var seo = JSON.parse(raw).seo_analytics;
            if (seo) {
              if (seo.google_analytics_id) window['ga-disable-' + seo.google_analytics_id] = true;
              if (seo.google_tag_manager_id) window['ga-disable-' + seo.google_tag_manager_id] = true;
            }
          }
        } catch(e) {}
        return; // Suppress loading trackers entirely
      }

      // Hook document.cookie to prevent redundant cookie writes that only update 'expires'
      try {
        var desc = Object.getOwnPropertyDescriptor(Document.prototype, 'cookie') || 
                   Object.getOwnPropertyDescriptor(HTMLDocument.prototype, 'cookie');
        if (desc && desc.set) {
          var orgSet = desc.set;
          var orgGet = desc.get;
          Object.defineProperty(document, 'cookie', {
            configurable: true,
            enumerable: true,
            get: function() { return orgGet.call(document); },
            set: function(val) {
              if (typeof val === 'string') {
                var p = val.split(';').map(function(s){return s.trim();}).filter(Boolean);
                var attrs = {}, cleaned = [p[0]];
                for (var i = 1; i < p.length; i++) {
                  var k = p[i].split('=')[0].toLowerCase();
                  if (!attrs[k]) { attrs[k] = true; cleaned.push(p[i]); }
                }
                val = cleaned.join('; ');
                var m = p[0].match(/^\s*(_ga(_[A-Za-z0-9_]+)?)=([^;]+)/);
                if (m && (orgGet.call(document) || '').indexOf(m[1] + '=' + m[3]) !== -1) return;
              }
              orgSet.call(document, val);
            }
          });
        }
      } catch(e) {}

      // Silence noisy third-party cookie/partitioned console warnings
      try {
        var orgWarn = console.warn;
        console.warn = function() {
          var msg = arguments[0];
          if (typeof msg === 'string' && (
            msg.indexOf('test_cookie') !== -1 ||
            msg.indexOf('doubleclick.net') !== -1 ||
            msg.indexOf('Partitioned') !== -1
          )) {
            return;
          }
          orgWarn.apply(console, arguments);
        };
      } catch(e) {}

      var CACHE_KEY='primary_config';
      /* Robust ID validator: rejects null, "null", "", "0", whitespace-only, X-placeholders */
      function ok(id){return typeof id==='string'&&id.trim().length>0&&id!=='null'&&id!=='undefined'&&id!=='0'&&!/^[Xx]+$/.test(id.trim());}
      /* FB Pixel ID must be purely numeric (9–16 digits) */
      function okPixel(id){return ok(id)&&/^\d{9,16}$/.test(id.trim());}

      // Khởi tạo dataLayer & gtag sớm để cấu hình cookie_update = false toàn cục
      window['dataLayer']=window['dataLayer']||[];
      function gtag(){window['dataLayer'].push(arguments);}
      window['gtag']=gtag;
      gtag('js',new Date());
      gtag('set', 'cookie_update', false);
      gtag('set', {'cookie_update': false}); // Triệt tiêu cảnh báo overwrite cookie expires khi chuyển trang
      gtag('set', 'cookie_flags', 'SameSite=None;Secure;Partitioned'); // Hỗ trợ Partitioned cookie cho GA/GTM

      function injectGTM(id){
        if(!ok(id)||window.__gtm_loaded__)return;
        window.__gtm_loaded__=true;
        window['dataLayer'].push({'gtm.start':new Date().getTime(),event:'gtm.js'});
        var f=document.getElementsByTagName('script')[0];
        var j=document.createElement('script');
        j.async=true;
        j.src='https://www.googletagmanager.com/gtm.js?id='+id;
        f.parentNode.insertBefore(j,f);
      }
      function injectGA(id){
        if(!ok(id))return;
        // Guard: nếu cùng GA ID đã được config rồi thì bỏ qua, tránh overwrite cookie
        if(window.__ga_id__===id)return;
        if(!window.__ga_loaded__){
          window.__ga_loaded__=true;
          var s=document.createElement('script');
          s.async=true;
          s.src='https://www.googletagmanager.com/gtag/js?id='+id;
          document.head.appendChild(s);
        }
        // Chỉ gọi config nếu ID chưa từng được config
        window.__ga_id__=id;
        window.gtag('config',id,{'cookie_update':false, 'cookie_flags': 'SameSite=None;Secure;Partitioned', 'allow_display_features': false});
      }
      function injectGSC(id){
        if(!ok(id)||document.querySelector('meta[name="google-site-verification"]'))return;
        var m=document.createElement('meta');
        m.name='google-site-verification';
        m.content=id;
        document.head.appendChild(m);
      }
      function injectFBPixel(id){
        if(!okPixel(id)||window.__fb_loaded__)return;
        window.__fb_loaded__=true;
        !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=true;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=true;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');
        window.fbq('init',id);
        window.fbq('track','PageView');
      }
      function applyTrackers(seo){
        if(!seo)return;
        var hasGTM=ok(seo.google_tag_manager_id);
        injectGTM(seo.google_tag_manager_id);
        /* Nếu đã có GTM thì KHÔNG inject GA4 trực tiếp.
           GTM container sẽ tự fire GA4 tag — tránh double-load
           cùng measurement ID gây overwrite cookie _ga_XXXXXXXX */
        if(!hasGTM){injectGA(seo.google_analytics_id);}
        injectGSC(seo.google_search_console_id);
        injectFBPixel(seo.facebook_pixel_id);
      }
      function runTracking() {
        /* 1. Zero-latency: try sessionStorage first */
        try{
          var raw=sessionStorage.getItem(CACHE_KEY);
          if(raw){applyTrackers(JSON.parse(raw).seo_analytics);}
        }catch(e){}
        /* 2. Async fallback: fetch fresh config & cache it */
        try{
          fetch('/api/v1/client/settings/primary',{cache:'no-store'})
            .then(function(r){return r.ok?r.json():null;})
            .then(function(d){
              if(!d)return;
              try{sessionStorage.setItem(CACHE_KEY,JSON.stringify(d));}catch(e){}
              applyTrackers(d.seo_analytics);
            }).catch(function(){});
        }catch(e){}
      }

      var trackerTriggered = false;
      function triggerTrackers() {
        if (trackerTriggered) return;
        trackerTriggered = true;
        var events = ['touchstart', 'scroll', 'click', 'mousemove'];
        events.forEach(function(e) {
          window.removeEventListener(e, triggerTrackers, { passive: true });
        });
        runTracking();
      }
      function scheduleTrackers() {
        var events = ['touchstart', 'scroll', 'click', 'mousemove'];
        events.forEach(function(e) {
          window.addEventListener(e, triggerTrackers, { passive: true });
        });
        setTimeout(triggerTrackers, 3500);
      }
      if (document.readyState === 'complete') {
        scheduleTrackers();
      } else {
        window.addEventListener('load', scheduleTrackers);
      }
    })();</script>
    <!-- End Dynamic Analytics Loader -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />
    <meta name="google" content="notranslate" />
    <meta name="theme-color" content="#f5f5f5" />
    
    <!-- [Elite V3.0] Universal AI Core -->
    <!-- We load this as a global script to bypass Vite's module redirection bugs -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" sizes="any" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    %sveltekit.head%
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", async () => {
          try {
            const registration = await navigator.serviceWorker.register("/sw.js");
            console.log("SW registered with scope:", registration.scope);
          } catch (err) {
            if (err.name === 'SecurityError' || err.message.includes('SSL certificate')) {
              console.warn(
                "%c[SSL ERROR]%c Service Worker registration failed due to untrusted certificate.\n" +
                "Please run 'bash scripts/setup-ssl.sh' and follow instructions to trust the Root CA.",
                "color: white; background: red; font-weight: bold; padding: 2px 4px; border-radius: 2px;",
                "color: red; font-weight: bold;"
              );
            } else {
              console.warn("SW registration failed: ", err);
            }
          }
        });
      }
    </script>
    <!-- Ads Protection: Click Shield V1.0 -->
    <script src="/js/click-shield.js" defer></script>
    <style>
      /* Prevent stark white screen flash during SPA initialization */
      html, body {
        background-color: #fafafa;
        margin: 0;
        padding: 0;
      }
      
      /* Dark theme overrides for Admin / Funnel */
      html.admin-theme, html.admin-theme body {
        background-color: #020202;
      }
    </style>
    <script>
      (function() {
        try {
          var h = window.location.hostname;
          var isAdmin = h.indexOf('admin.') !== -1 || window.location.search.indexOf('admin') !== -1;
          var lastBg = localStorage.getItem('last_bg_color');
          var isDark = isAdmin || lastBg === '#020202' || lastBg === '#010101';
          if (isDark) {
            document.documentElement.classList.add('admin-theme');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body data-sveltekit-preload-data="hover">
    <div class="contents">
      <!-- Premium Top Progress Bar (Google Style) -->
      <div id="initial-loader" style="position: fixed; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent, #C18F7E, #E3B5A4, transparent); background-size: 200% 100%; z-index: 999999; animation: initial-progress 2s infinite linear; transition: opacity 0.4s ease;"></div>
      <style>
        @keyframes initial-progress {
          0% { background-position: 200% 0; }
          100% { background-position: -200% 0; }
        }
        @keyframes sk-shimmer {
          0%   { background-position: -600px 0; }
          100% { background-position: 600px 0; }
        }
        .sk-shine {
          background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 37%, #f0f0f0 63%);
          background-size: 600px 100%;
          animation: sk-shimmer 1.4s infinite linear;
        }
        .sk-shine-dark {
          background: linear-gradient(90deg, #1a1a1a 25%, #222 37%, #1a1a1a 63%);
          background-size: 600px 100%;
          animation: sk-shimmer 1.4s infinite linear;
        }
      </style>

      <!-- Storefront Instant Skeleton — renders BEFORE JS, eliminates FCP blank screen -->
      <div id="app-skeleton" style="position:fixed;inset:0;z-index:999998;background:#fafafa;display:flex;flex-direction:column;overflow:hidden;transition:opacity 0.35s ease;">

        <!-- Top bar: logo + cart icon -->
        <div id="sk-header" style="height:52px;background:#fff;border-bottom:1px solid #f0ece8;display:flex;align-items:center;justify-content:space-between;padding:0 14px;box-sizing:border-box;flex-shrink:0;">
          <div style="width:28px;height:28px;border-radius:6px;" class="sk-shine"></div>
          <div style="width:90px;height:18px;border-radius:6px;" class="sk-shine"></div>
          <div style="width:28px;height:28px;border-radius:50%;" class="sk-shine"></div>
        </div>

        <!-- Flash sale banner placeholder -->
        <div style="height:56px;background:linear-gradient(90deg,#ee4d2d,#ff7337);display:flex;align-items:center;padding:0 14px;gap:8px;flex-shrink:0;">
          <div style="width:48px;height:22px;background:rgba(255,255,255,0.25);border-radius:4px;"></div>
          <div style="width:120px;height:28px;background:rgba(255,255,255,0.2);border-radius:4px;"></div>
        </div>

        <!-- Product image skeleton (square) -->
        <div id="sk-image" style="width:100%;aspect-ratio:1/1;max-height:55vw;flex-shrink:0;overflow:hidden;" class="sk-shine"></div>

        <!-- Voucher bar -->
        <div style="height:36px;background:#fff;border-bottom:1px solid #f5f0eb;display:flex;align-items:center;gap:8px;padding:0 14px;box-sizing:border-box;flex-shrink:0;">
          <div style="width:80px;height:22px;border-radius:4px;border:1px dashed #C18F7E;opacity:0.5;"></div>
          <div style="width:60px;height:22px;border-radius:4px;border:1px dashed #C18F7E;opacity:0.4;"></div>
        </div>

        <!-- Product info -->
        <div style="flex:1;background:#fff;padding:12px 14px;display:flex;flex-direction:column;gap:10px;box-sizing:border-box;">
          <div id="sk-title" style="width:85%;height:20px;border-radius:5px;" class="sk-shine"></div>
          <div id="sk-sub"   style="width:60%;height:16px;border-radius:5px;" class="sk-shine"></div>
          <div style="display:flex;gap:8px;margin-top:4px;">
            <div style="width:44px;height:44px;border-radius:6px;" class="sk-shine"></div>
            <div style="width:44px;height:44px;border-radius:6px;" class="sk-shine"></div>
            <div style="width:44px;height:44px;border-radius:6px;" class="sk-shine"></div>
          </div>
          <div id="sk-line1" style="width:100%;height:13px;border-radius:4px;" class="sk-shine"></div>
          <div id="sk-line2" style="width:100%;height:13px;border-radius:4px;" class="sk-shine"></div>
          <div id="sk-line3" style="width:78%;height:13px;border-radius:4px;" class="sk-shine"></div>
        </div>
      </div>
      
      <script>
        (function() {
          try {
            var h = window.location.hostname;
            var isAdmin = h.indexOf('admin.') !== -1 || window.location.search.indexOf('admin') !== -1;
            var lastBg = localStorage.getItem('last_bg_color');
            var isDark = isAdmin || lastBg === '#020202' || lastBg === '#010101';
            if (isDark) {
              var sk = document.getElementById('app-skeleton');
              if (sk) sk.style.background = '#020202';
              var skHeader = document.getElementById('sk-header');
              if (skHeader) {
                skHeader.style.background = '#0b0b0b';
                skHeader.style.borderBottom = '1px solid #1f1f1f';
              }
              var skImg = document.getElementById('sk-image');
              if (skImg) {
                skImg.style.background = '#121212';
                skImg.style.borderColor = '#1f1f1f';
              }
              var skTitle = document.getElementById('sk-title');
              if (skTitle) skTitle.style.background = '#1e1e1e';
              var skSub = document.getElementById('sk-sub');
              if (skSub) skSub.style.background = '#161616';
              var skLine1 = document.getElementById('sk-line1');
              if (skLine1) skLine1.style.background = '#161616';
              var skLine2 = document.getElementById('sk-line2');
              if (skLine2) skLine2.style.background = '#161616';
              var skLine3 = document.getElementById('sk-line3');
              if (skLine3) skLine3.style.background = '#161616';
            }
          } catch (e) {}
        })();
      </script>

      %sveltekit.body%
    </div>
  </body>
</html>
