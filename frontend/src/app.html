<!doctype html>
<html lang="vi" translate="no">
  <head>
    <meta charset="utf-8" />
    <!-- [Elite V2.2] Dynamic Analytics Loader — GTM + GA + GSC + FB Pixel -->
    <script src="/js/analytics.js"></script>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />
    <meta name="google" content="notranslate" />
    <meta name="theme-color" content="#f5f5f5" />
    
    <!-- [Elite V3.0] Universal AI Core -->
    <!-- We load this as a global script to bypass Vite's module redirection bugs -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" sizes="any" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    %sveltekit.head%
    <script src="/js/sw-register.js"></script>
    <!-- Ads Protection: Click Shield V1.0 -->
    <script src="/js/click-shield.js" defer></script>
    <style>html,body{background-color:#fafafa;margin:0;padding:0}html.admin-theme,html.admin-theme body{background-color:#020202}</style>
    <script src="/js/theme-loader.js"></script>
  </head>
  <body data-sveltekit-preload-data="hover">
    <div class="contents">
      <!-- Premium Top Progress Bar (Google Style) -->
      <div id="initial-loader" style="position: fixed; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent, #C18F7E, #E3B5A4, transparent); background-size: 200% 100%; z-index: 999999; animation: initial-progress 2s infinite linear; transition: opacity 0.4s ease;"></div>
      <style>@keyframes initial-progress{0%{background-position:200% 0}100%{background-position:-200% 0}}@keyframes sk-shimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}.sk-shine{background:linear-gradient(90deg,#f0f0f0 25%,#e8e8e8 37%,#f0f0f0 63%);background-size:600px 100%;animation:sk-shimmer 1.4s infinite linear}.sk-shine-dark{background:linear-gradient(90deg,#1a1a1a 25%,#222 37%,#1a1a1a 63%);background-size:600px 100%;animation:sk-shimmer 1.4s infinite linear}</style>
      %sveltekit.body%
    </div>
  </body>
</html>
