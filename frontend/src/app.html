<!doctype html>
<html lang="vi" translate="no">
  <head>
    <meta charset="utf-8" />
    <!-- [Elite V2.2] Analytics deferred to avoid render-blocking -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />
    <meta name="google" content="notranslate" />
    <meta name="theme-color" content="#f5f5f5" />
    
    <!-- [Elite V3.0] Universal AI Core -->
    <!-- We load this as a global script to bypass Vite's module redirection bugs -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" sizes="any" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    %sveltekit.head%
    <!-- Ads Protection: Click Shield V1.0 -->
    <script src="/js/click-shield.js" defer></script>
    <style>html,body{background-color:#fafafa;margin:0;padding:0}html.admin-theme,html.admin-theme body{background-color:#020202}</style>
    <script>try{var h=location.hostname,d=localStorage.getItem('last_bg_color');if(h.indexOf('admin.')!==-1||location.search.indexOf('admin')!==-1||d==='#020202'||d==='#010101')document.documentElement.classList.add('admin-theme')}catch(e){}</script>
  </head>
  <body data-sveltekit-preload-data="hover">
    <div class="contents">
      %sveltekit.body%
    </div>
    <script src="/js/analytics.js" defer></script>
    <script src="/js/sw-register.js" defer></script>
  </body>
</html>
