<!doctype html>
<html lang="vi" translate="no">
  <head>
    <!-- Google Tag Manager -->
    <script>
      (function() {
        try {
          var cached = sessionStorage.getItem('primary_config');
          var settings = null;
          if (cached) {
            try {
              settings = JSON.parse(cached);
            } catch(e) {}
          }
          
          function initGTM(gtmId) {
            if (!gtmId) return;
            (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
            new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
            j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
            'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
            })(window,document,'script','dataLayer',gtmId);

            var injectNoscript = function() {
              if (document.getElementById('gtm-noscript-' + gtmId)) return;
              var ns = document.createElement('noscript');
              ns.id = 'gtm-noscript-' + gtmId;
              var ifr = document.createElement('iframe');
              ifr.src = 'https://www.googletagmanager.com/ns.html?id=' + gtmId;
              ifr.height = '0';
              ifr.width = '0';
              ifr.style.display = 'none';
              ifr.style.visibility = 'hidden';
              ns.appendChild(ifr);
              document.body.insertBefore(ns, document.body.firstChild);
            };

            if (document.body) {
              injectNoscript();
            } else {
              window.addEventListener('DOMContentLoaded', injectNoscript);
            }
          }

          if (settings) {
            var seo = settings.seo_analytics;
            var gtmId = seo?.google_tag_manager_id || seo?.gtm_id;
            if (!gtmId && seo?.google_analytics_id && seo.google_analytics_id.indexOf('GTM-') === 0) {
              gtmId = seo.google_analytics_id;
            }
            if (gtmId) initGTM(gtmId);
          } else {
            fetch('/api/v1/client/settings/primary')
              .then(function(res) { return res.json(); })
              .then(function(data) {
                if (data) {
                  sessionStorage.setItem('primary_config', JSON.stringify(data));
                  var seo = data.seo_analytics;
                  var gtmId = seo?.google_tag_manager_id || seo?.gtm_id;
                  if (!gtmId && seo?.google_analytics_id && seo.google_analytics_id.indexOf('GTM-') === 0) {
                    gtmId = seo.google_analytics_id;
                  }
                  if (gtmId) initGTM(gtmId);
                }
              })
              .catch(function(err) {
                console.warn('[GTM] Settings load failed:', err);
              });
          }
        } catch (err) {
          console.warn('[GTM] Init error:', err);
        }
      })();
    </script>
    <!-- End Google Tag Manager -->
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0"
    />
    <meta name="google" content="notranslate" />
    <meta name="theme-color" content="#f5f5f5" />
    
    <!-- [Elite V3.0] Universal AI Core -->
    <!-- We load this as a global script to bypass Vite's module redirection bugs -->
    <script src="/wasm/ort.min.js"></script>
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    %sveltekit.head%
    <script>
      /**
       * Service Worker Registration for Fast Platform
       * Requires HTTPS or Localhost. For .test domains, the Caddy Root CA must be trusted.
       */
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", async () => {
          try {
            const registration = await navigator.serviceWorker.register("/sw.js");
            console.log("SW registered with scope:", registration.scope);
          } catch (err) {
            // Check for SSL certificate errors specifically
            if (err.name === 'SecurityError' || err.message.includes('SSL certificate')) {
              console.warn(
                "%c[SSL ERROR]%c Service Worker registration failed due to untrusted certificate.\n" +
                "Please run 'bash scripts/setup-ssl.sh' and follow instructions to trust the Root CA.",
                "color: white; background: red; font-weight: bold; padding: 2px 4px; border-radius: 2px;",
                "color: red; font-weight: bold;"
              );
            } else {
              console.warn("SW registration failed: ", err);
            }
          }
        });
      }
    </script>
    <!-- Ads Protection: Click Shield V1.0 -->
    <script src="/js/click-shield.js" defer></script>
  </head>
  <body data-sveltekit-preload-data="hover">
    <div class="contents">%sveltekit.body%</div>
  </body>
</html>
