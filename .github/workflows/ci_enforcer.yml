name: 🛡️ The Enforcer Pipeline

on:
  pull_request:
    branches:
      - main

jobs:
  rule-r69-loc-check:
    name: "R69: LOC Discipline Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check LOC (Smart Enforcer V61.0)
        run: |
          echo "Bắt đầu quét quy tắc R69: 300 LOC cho logic, 550 cho py, 800 cho svelte..."
          VIOLATIONS=""
          
          # Quét tất cả, loại trừ types.ts và thư mục migrations, seeders
          FILES=$(find backend frontend -type f \( -name "*.py" -o -name "*.ts" -o -name "*.svelte" \) ! -name "types.ts" ! -path "*/migrations/*")
          
          for file in $FILES; do
            loc=$(wc -l < "$file")
            
            # Cấu hình "Smart Enforcer"
            if [[ "$file" == *.svelte ]] || [[ "$file" == *.svelte.ts ]]; then
              LIMIT=800
            elif [[ "$file" == *.py ]]; then
              LIMIT=550
            else
              LIMIT=300
            fi
            
            if [ "$loc" -gt "$LIMIT" ]; then
              echo "🚨 PHÁT HIỆN VI PHẠM R69: $file có $loc dòng (Giới hạn: $LIMIT dòng)."
              VIOLATIONS="$VIOLATIONS\n$file ($loc lines, limit: $LIMIT)"
            fi
          done
          
          if [ -n "$VIOLATIONS" ]; then
            echo -e "❌ Workflow thất bại! Vui lòng chia nhỏ các file sau để tuân thủ Thiết Quân Luật V61.0:"
            echo -e "$VIOLATIONS"
            exit 1
          else
            echo "✅ Toàn bộ file tuân thủ giới hạn LOC Code."
          fi

  rule-r70-dependency-check:
    name: "R70: Anti-Latest Dependency Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Quét package.json chống chuỗi "latest"
        run: |
          echo "Bắt đầu quét quy tắc R70 (Chống sử dụng 'latest' tag)..."
          if grep -q '"latest"' frontend/package.json; then
            echo '🚨 PHÁT HIỆN VI PHẠM R70: Tìm thấy tag "latest" trong frontend/package.json'
            echo '❌ Hệ thống yêu cầu ghim version cụ thể để đảm bảo tính ổn định lâu dài.'
            exit 1
          else
            echo '✅ frontend/package.json tuân thủ nghiêm ngặt (không dùng "latest").'
          fi

  rule-r71-test-mandate:
    name: "R71: Backend Unit Test Mandate"
    runs-on: ubuntu-latest
    
    # Cung cấp Service Database/Redis ảo để Test Client có thể kết nối
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: mlap
          POSTGRES_PASSWORD: admin@123A3%StrongPassword
          POSTGRES_DB: fast_platform_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Cài đặt công cụ UV
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest" # Cái này là cho uv setup, không vi phạm R70 project_tree

      - name: Thiết lập môi trường Python 3.14-slim (Bắt buộc V61.0)
        uses: actions/setup-python@v5
        with:
          python-version: "3.14.0-alpha.5" # Hoặc version 3.14 tương thích mới nhất

      - name: Đồng bộ thư viện Backend
        run: uv sync
        
      - name: Chạy Pytest & Check Health
        env:
          # Cắm env trỏ thẳng vào các Database Ảo cục bộ
          DATABASE_URL: postgresql+asyncpg://mlap:admin@123A3%StrongPassword@localhost:5432/fast_platform_db
          REDIS_URL: redis://localhost:6379/0
          ENCRYPTION_SALT: "dummy_salt_for_testing_only_12345"
          GEMINI_API_KEY_1: "dummy_key_1"
        run: |
          echo "Bắt đầu chạy Unit Tests..."
          uv run pytest backend/tests/
          echo "✅ Backend Tests Passed"
